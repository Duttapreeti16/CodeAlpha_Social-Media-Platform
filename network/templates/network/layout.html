{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Social Network</title>
    <link href="{% static 'css/styles.css' %}" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <a class="nav-brand" href="{% url 'index' %}">Nexus</a>
        <div class="nav-links">
            {% if user.is_authenticated %}
                <span class="nav-link">Hi, {{ user.username }}</span>
                <a class="nav-link" href="{% url 'profile' user.username %}">Profile</a>
                <a class="btn btn-outline" href="{% url 'logout' %}">Log Out</a>
            {% else %}
                <a class="nav-link" href="{% url 'login' %}">Log In</a>
                <a class="btn btn-primary" href="{% url 'register' %}">Register</a>
            {% endif %}
        </div>
    </nav>

    <main class="container">
        {% block body %}
        {% endblock %}
    </main>

    <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
