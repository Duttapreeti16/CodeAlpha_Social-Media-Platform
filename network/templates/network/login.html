{% extends "network/layout.html" %}

{% block body %}
<div class="glass-card" style="max-width: 400px; margin: 4rem auto; text-align: center;">
    <h2 style="margin-bottom: 1.5rem; font-weight: 700;">Welcome Back</h2>
    
    <form action="{% url 'login' %}" method="POST">
        {% csrf_token %}
        <div class="form-group" style="text-align: left;">
            {{ form.username.label_tag }}
            <input type="text" name="username" class="form-control" autofocus required>
        </div>
        <div class="form-group" style="text-align: left;">
            {{ form.password.label_tag }}
            <input type="password" name="password" class="form-control" required>
        </div>
        
        {% if form.errors %}
            <div style="color: var(--danger-color); margin-bottom: 1rem; font-size: 0.9rem; text-align: left;">
                Invalid username or password.
            </div>
        {% endif %}

        <button class="btn btn-primary" type="submit" style="width: 100%; margin-top: 1rem;">Log In</button>
    </form>

    <div style="margin-top: 1.5rem; font-size: 0.9rem;">
        Don't have an account? <a href="{% url 'register' %}">Register here.</a>
    </div>
</div>
{% endblock %}
